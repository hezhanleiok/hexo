// 更新文章编辑器中的分类选择（单选）
function updateArticleCategories() {
  const categoriesSelect = document.getElementById('articleCategories');
  if (categoriesSelect) {
    categoriesSelect.innerHTML = '<option value="">请选择分类</option>';
    categories.forEach(category => {
      const option = document.createElement('option');
      option.value = category.name;
      option.textContent = category.name;
      categoriesSelect.appendChild(option);
    });

// 渲染文章列表
function renderArticles() {
  const articlesList = document.querySelector('.articles-list');
  if (articlesList) {
    articlesList.innerHTML = '';
    
    if (articles.length === 0) {
      articlesList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-check-circle"></i>
          <p>暂无已发布文章</p>
        </div>
      `;
      return;
    }
    
    articles.forEach(article => {
      const articleItem = document.createElement('div');
      articleItem.className = 'article-item';
      articleItem.innerHTML = `
        <div class="article-info">
          <h3>${article.title}</h3>
          <p class="article-meta">
            发布时间: ${new Date(article.publishedAt).toLocaleString()}
            ${article.categories.length > 0 ? ` | 分类: ${article.categories.join(', ')}` : ''}
            ${article.tags.length > 0 ? ` | 标签: ${article.tags.join(', ')}` : ''}
          </p>
        </div>
        <div class="article-actions">
          <button class="btn btn-small btn-edit" data-id="${article.id}">编辑</button>
          <button class="btn btn-small btn-danger" data-id="${article.id}">删除</button>
        </div>
      `;
      articlesList.appendChild(articleItem);
    });
    
    // 使用事件委托来处理编辑和删除按钮的点击事件
    // 先移除旧的监听器（如果存在）
    const oldListener = articlesList._clickListener;
    if (oldListener) {
      articlesList.removeEventListener('click', oldListener);
    }
    
    const articlesListClickHandler = function(e) {
      let target = e.target;
      // 如果点击的是按钮内的图标，获取父按钮元素
      if (!target.classList.contains('btn-edit') && !target.classList.contains('btn-danger')) {
        target = target.closest('.btn-edit, .btn-danger');
      }
      if (!target) return;
      
      // 处理编辑按钮点击（id 可能是字符串或数字）
      if (target.classList.contains('btn-edit')) {
        const idStr = target.dataset.id;
        const article = articles.find(a => String(a.id) === idStr);
        if (article) {
          // 填充表单
          document.getElementById('articleTitle').value = article.title;
          document.getElementById('articleContent').innerHTML = article.content || '<p>文章内容加载中...</p>';
          document.getElementById('articleExcerpt').value = article.excerpt || '';
          
          // 选择分类（单选）
          const categoriesSelect = document.getElementById('articleCategories');
          if (categoriesSelect && article.categories.length > 0) {
            categoriesSelect.value = article.categories[0];
          }
          
          // 填充文章别名
          document.getElementById('articleSlug').value = article.slug || '';
          // 填充文章封面
          document.getElementById('articleCover').value = article.cover || '';
          if (article.cover) {
            document.getElementById('coverPreview').innerHTML = `<img src="${article.cover}" alt="封面预览" onerror="this.parentElement.innerHTML=\'<p style=color:#e74c3c>图片加载失败</p>\'">`;
          } else {
            document.getElementById('coverPreview').innerHTML = '';
          }
          // 填充标签
          document.getElementById('articleTags').value = article.tags.join(', ');
          
          // 切换到编辑器页面
          document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
          document.querySelectorAll('.dashboard-section').forEach(section => section.classList.remove('active'));
          document.querySelector('.menu-item[href="#editor"]').classList.add('active');
          document.getElementById('editor').classList.add('active');
          
          // 保存当前编辑的文章ID（使用字符串）
          localStorage.setItem('currentEditingArticleId', idStr);
        }
      }
      
      // 处理删除按钮点击（id 可能是字符串或数字）
      if (target.classList.contains('btn-danger')) {
        const idStr = target.dataset.id;
        if (confirm('确定要删除这篇文章吗？')) {
          articles = articles.filter(a => String(a.id) !== idStr);
          localStorage.setItem('publishedArticles', JSON.stringify(articles));
          renderArticles();
          alert('文章删除成功！');
        }
      }
    };
    
    articlesList._clickListener = articlesListClickHandler;
    articlesList.addEventListener('click', articlesListClickHandler);
  }
}

// 渲染草稿列表
function renderDrafts() {
  const draftsList = document.querySelector('.drafts-list');
  if (draftsList) {
    const drafts = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('draft_')) {
        drafts.push(JSON.parse(localStorage.getItem(key)));
      }
    }
    
    draftsList.innerHTML = '';
    
    if (drafts.length === 0) {
      draftsList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-file-alt"></i>
          <p>暂无草稿</p>
        </div>
      `;
      return;
    }
    
    drafts.forEach(draft => {
      const draftItem = document.createElement('div');
      draftItem.className = 'draft-item';
      draftItem.innerHTML = `
        <div class="draft-info">
          <h3>${draft.title || '无标题'}</h3>
          <p class="draft-meta">
            保存时间: ${new Date(draft.timestamp).toLocaleString()}
          </p>
        </div>
        <div class="draft-actions">
          <button class="btn btn-small btn-primary" data-timestamp="${draft.timestamp}">编辑</button>
          <button class="btn btn-small btn-danger" data-timestamp="${draft.timestamp}">删除</button>
        </div>
      `;
      draftsList.appendChild(draftItem);
    });
  }
}

// 渲染公告列表
function renderAnnouncements() {
  const announcementsList = document.querySelector('.announcements-list');
  if (announcementsList) {
    announcementsList.innerHTML = '';
    
    if (announcements.length === 0) {
      announcementsList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-bullhorn"></i>
          <p>暂无公告</p>
        </div>
      `;
      return;
    }
    
    announcements.forEach(announcement => {
      const announcementItem = document.createElement('div');
      announcementItem.className = 'announcement-item';
      announcementItem.innerHTML = `
        <div class="announcement-info">
          <h3>${announcement.title}</h3>
          <p class="announcement-meta">
            发布时间: ${new Date(announcement.publishedAt).toLocaleString()}
          </p>
          <div class="announcement-content">${announcement.content}</div>
        </div>
        <div class="announcement-actions">
          <button class="btn btn-small btn-edit" data-id="${announcement.id}">编辑</button>
          <button class="btn btn-small btn-danger" data-id="${announcement.id}">删除</button>
        </div>
      `;
      announcementsList.appendChild(announcementItem);
    });
    
    // 使用事件委托处理编辑和删除按钮
    announcementsList.addEventListener('click', function(e) {
      let target = e.target;
      // 如果点击的是按钮内的图标，获取父按钮元素
      if (!target.classList.contains('btn-edit') && !target.classList.contains('btn-danger')) {
        target = target.closest('.btn-edit, .btn-danger');
      }
      if (!target) return;
      
      if (target.classList.contains('btn-edit')) {
        const id = parseInt(target.dataset.id);
        const announcement = announcements.find(a => a.id === id);
        if (announcement) {
          const newTitle = prompt('请输入新的公告标题:', announcement.title);
          if (newTitle) {
            const newContent = prompt('请输入新的公告内容:', announcement.content);
            if (newContent !== null) {
              announcement.title = newTitle;
              announcement.content = newContent;
              announcement.publishedAt = new Date().toISOString();
              saveAnnouncements();
              renderAnnouncements();
              alert('公告编辑成功！');
            }
          }
        }
      }
      
      if (target.classList.contains('btn-danger')) {
        const id = parseInt(target.dataset.id);
        if (confirm('确定要删除这个公告吗？')) {
          announcements = announcements.filter(a => a.id !== id);
          saveAnnouncements();
          renderAnnouncements();
          alert('公告删除成功！');
        }
      }
    });
  }
}

// 渲染标签列表
function renderTags() {
  const tagsList = document.querySelector('.tags-list');
  if (tagsList) {
    tagsList.innerHTML = '';
    
    if (tags.length === 0) {
      tagsList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-tags"></i>
          <p>暂无标签</p>
        </div>
      `;
      return;
    }
    
    tags.forEach(tag => {
      const tagItem = document.createElement('div');
      tagItem.className = 'tag-item';
      tagItem.innerHTML = `
        <span class="tag-name">${tag.name}</span>
        <span class="tag-count">(${tag.length || 0} 篇文章)</span>
        <div class="tag-actions">
          <button class="btn btn-small btn-danger" data-name="${tag.name}">删除</button>
        </div>
      `;
      tagsList.appendChild(tagItem);
    });
    
    // 添加删除事件
    document.querySelectorAll('.tag-item .btn-danger').forEach(btn => {
      btn.addEventListener('click', function() {
        const tagName = this.dataset.name;
        if (confirm(`确定要删除标签"${tagName}"吗？\n删除后，所有文章中的该标签将被移除。`)) {
          // 从所有文章中移除该标签
          articles.forEach(article => {
            if (article.tags && article.tags.includes(tagName)) {
              article.tags = article.tags.filter(t => t !== tagName);
            }
          });
          localStorage.setItem('publishedArticles', JSON.stringify(articles));
          
          // 从标签列表中移除
          tags = tags.filter(t => t.name !== tagName);
          saveTags();
          renderTags();
          renderArticles();
          alert(`标签"${tagName}"已删除，相关文章已同步更新！`);
        }
      });
    });
  }
}

// 编辑器功能实现
document.addEventListener('DOMContentLoaded', function() {
  // 检查登录状态
  checkLoginStatus();
  
  // 加载数据
  loadData();
  
  // 登录按钮事件
  const loginBtn = document.getElementById('loginBtn');
  if (loginBtn) {
    loginBtn.addEventListener('click', handleLogin);
  }
  
  // 退出登录按钮事件
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', function(e) {
      e.preventDefault();
      handleLogout();
    });
  }
  
  // 回车登录
  const passwordInput = document.getElementById('password');
  if (passwordInput) {
    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleLogin();
      }
    });
  }
  
  // 工具栏功能
  const toolbarButtons = document.querySelectorAll('.tool-btn');
  toolbarButtons.forEach(btn => {
    btn.addEventListener('click', function() {
      const command = this.dataset.command;
      document.execCommand(command, false, null);
      document.getElementById('articleContent').focus();
    });
  });

  // 字体大小
  const fontSizeSelect = document.getElementById('fontSize');
  if (fontSizeSelect) {
    fontSizeSelect.addEventListener('change', function() {
      document.execCommand('fontSize', false, this.value);
    });
  }

  // 字体颜色
  const fontColorSelect = document.getElementById('fontColor');
  if (fontColorSelect) {
    fontColorSelect.addEventListener('change', function() {
      document.execCommand('foreColor', false, this.value);
    });
  }

  // 字体
  const fontFamilySelect = document.getElementById('fontFamily');
  if (fontFamilySelect) {
    fontFamilySelect.addEventListener('change', function() {
      document.execCommand('fontName', false, this.value);
    });
  }

  // 图片插入
  const insertImageBtn = document.querySelector('[data-command="insertImage"]');
  if (insertImageBtn) {
    insertImageBtn.addEventListener('click', function() {
      const url = prompt('请输入图片URL:');
      if (url) {
        document.execCommand('insertImage', false, url);
      }
    });
  }

  // 视频插入
  const insertVideoBtn = document.querySelector('[data-command="insertVideo"]');
  if (insertVideoBtn) {
    insertVideoBtn.addEventListener('click', function() {
      const url = prompt('请输入视频URL:');
      if (url) {
        const videoHtml = `<video controls width="100%"><source src="${url}" type="video/mp4"></video>`;
        document.execCommand('insertHTML', false, videoHtml);
      }
    });
  }

  // 菜单切换
  const menuItems = document.querySelectorAll('.menu-item');
  const sections = document.querySelectorAll('.dashboard-section');
  
  menuItems.forEach(item => {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      const target = this.getAttribute('href').substring(1);
      
      // 跳过退出登录按钮
      if (target === '') return;
      
      menuItems.forEach(i => i.classList.remove('active'));
      sections.forEach(s => s.classList.remove('active'));
      
      this.classList.add('active');
      document.getElementById(target).classList.add('active');
      
      // 渲染对应内容
      if (target === 'categories') {
        renderCategories();
      } else if (target === 'tags') {
        renderTags();
      } else if (target === 'published') {
        renderArticles();
      } else if (target === 'drafts') {
        renderDrafts();
      } else if (target === 'announcements') {
        renderAnnouncements();
      } else if (target === 'comments') {
        renderComments();
      } else if (target === 'editor') {
        updateArticleCategories();
      }
    });
  });

  // 保存草稿
  const saveDraftBtn = document.getElementById('saveDraft');
  if (saveDraftBtn) {
    saveDraftBtn.addEventListener('click', function() {
      const categoriesSelect = document.getElementById('articleCategories');
      const articleData = {
        title: document.getElementById('articleTitle').value,
        content: document.getElementById('articleContent').innerHTML,
        categories: categoriesSelect.value ? [categoriesSelect.value] : [],
        tags: document.getElementById('articleTags').value.split(',').map(tag => tag.trim()).filter(tag => tag),
        cover: document.getElementById('articleCover').value,
        excerpt: document.getElementById('articleExcerpt').value,
        timestamp: new Date().toISOString()
      };
      
      localStorage.setItem('draft_' + Date.now(), JSON.stringify(articleData));
      alert('草稿保存成功！');
    });
  }

  // 文章封面URL输入预览
  const articleCoverInput = document.getElementById('articleCover');
  const coverPreview = document.getElementById('coverPreview');
  if (articleCoverInput && coverPreview) {
    articleCoverInput.addEventListener('input', function() {
      const url = this.value.trim();
      if (url) {
        coverPreview.innerHTML = `<img src="${url}" alt="封面预览" onerror="this.parentElement.innerHTML='<p style=color:#e74c3c>图片加载失败</p>'">`;
      } else {
        coverPreview.innerHTML = '';
      }
    });
  }

  // 发布/更新文章
  const publishArticleBtn = document.getElementById('publishArticle');
  if (publishArticleBtn) {
    publishArticleBtn.addEventListener('click', function() {
      const title = document.getElementById('articleTitle').value;
      if (!title) {
        alert('请输入文章标题！');
        return;
      }
      
      // 检查是否是编辑现有文章
      const editingArticleId = localStorage.getItem('currentEditingArticleId');
      const categoriesSelect = document.getElementById('articleCategories');
      
      let articleData = {
        title: title,
        content: document.getElementById('articleContent').innerHTML,
        categories: categoriesSelect.value ? [categoriesSelect.value] : [],
        tags: document.getElementById('articleTags').value.split(',').map(tag => tag.trim()).filter(tag => tag),
        cover: document.getElementById('articleCover').value,
        excerpt: document.getElementById('articleExcerpt').value,
      };
      
      if (editingArticleId) {
        // 更新现有文章（id 可能是字符串）
        const existingArticle = articles.find(a => String(a.id) === editingArticleId);
        if (existingArticle) {
          articleData.id = existingArticle.id;
          articleData.publishedAt = existingArticle.publishedAt;
          articleData.slug = existingArticle.slug;
          articleData.path = existingArticle.path;
          const index = articles.findIndex(a => String(a.id) === editingArticleId);
          articles[index] = articleData;
        }
        localStorage.removeItem('currentEditingArticleId');
      } else {
        // 创建新文章
        articleData.id = Date.now();
        articleData.publishedAt = new Date().toISOString();
        // 生成文章路径（使用标题的拼音或英文）
        const slug = articleData.title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        articleData.slug = slug || 'post-' + articleData.id;
        articleData.path = 'post/' + articleData.slug;
        articles.push(articleData);
      }
      
      // 自动添加文章中的标签到标签管理
      articleData.tags.forEach(tagName => {
        const existingTag = tags.find(tag => tag.name === tagName);
        if (!existingTag) {
          const newTag = {
            id: Date.now() + Math.random(),
            name: tagName,
            length: 1
          };
          tags.push(newTag);
        } else {
          existingTag.length = (existingTag.length || 0) + 1;
        }
      });
      saveTags();
      renderTags();
      
      // 保存到本地存储
      localStorage.setItem('publishedArticles', JSON.stringify(articles));
      
      // 重新渲染文章列表
      renderArticles();
      
      alert(editingArticleId ? '文章更新成功！' : '文章发布成功！');
      // 清空表单
      document.getElementById('articleTitle').value = '';
      document.getElementById('articleSlug').value = '';
      document.getElementById('articleContent').innerHTML = '<p>开始编写您的文章内容...</p>';
      document.getElementById('articleCategories').selectedIndex = -1;
      document.getElementById('articleTags').value = '';
      document.getElementById('articleExcerpt').value = '';
      document.getElementById('articleCover').value = '';
      document.getElementById('coverPreview').innerHTML = '';
      localStorage.removeItem('currentEditingArticleId');
    });
  }
  
  // 添加分类
  const addCategoryBtn = document.getElementById('addCategory');
  if (addCategoryBtn) {
    addCategoryBtn.addEventListener('click', function() {
      const categoryName = prompt('请输入分类名称:');
      if (categoryName) {
        const newCategory = {
          id: Date.now(),
          name: categoryName
        };
        categories.push(newCategory);
        saveCategories();
        renderCategories();
        updateArticleCategories();
        alert('分类添加成功！');
      }
    });
  }
  
  // 注意：标签是从文章中自动获取的，不需要手动添加
  // 隐藏添加标签按钮
  const addTagBtn = document.getElementById('addTag');
  if (addTagBtn) {
    addTagBtn.style.display = 'none';
  }
  
  // 发布公告
  const addAnnouncementBtn = document.getElementById('addAnnouncement');
  if (addAnnouncementBtn) {
    addAnnouncementBtn.addEventListener('click', function() {
      const title = prompt('请输入公告标题:');
      if (title) {
        const content = prompt('请输入公告内容:');
        if (content) {
          const newAnnouncement = {
            id: Date.now(),
            title: title,
            content: content,
            publishedAt: new Date().toISOString()
          };
          announcements.push(newAnnouncement);
          saveAnnouncements();
          renderAnnouncements();
          alert('公告发布成功！');
        }
      }
    });
  }
  
  // 初始化渲染
  renderCategories();
  renderTags();
  renderArticles();
  renderDrafts();
  renderAnnouncements();
  renderComments();
  updateArticleCategories();
  
  // 加载已发布文章数据
  articles = JSON.parse(localStorage.getItem('publishedArticles') || '[]');
  renderArticles();
});
