# ==========================================
# 个人资料设置 (这里修改简介)
# ==========================================
author:
  name: Xiao He
  description: '热爱技术热爱生活。' # 确保这里是这一句
  avatar: /img/avatar.png
  link: /

# ==========================================
# 侧边栏卡片设置
# ==========================================
aside:
  display:
    archive: true
    category: true
    tag: true
  card_author:
    enable: true
  card_announcement:
    enable: true
    content: "欢迎来到我的个人博客"
  # 关键修复：确保这部分在 aside 下面，且缩进正确
  card_newest_comments:
    enable: true
    limit: 6
    avatar: true
    avatar_size: 40
  card_categories:
    enable: true
  card_tags:
    enable: true
  card_archives:
    enable: true
  card_webinfo:
    enable: true
    post_count: true

# ==========================================
# 评论系统配置
# ==========================================
comments:
  use: 
    - Twikoo # 必须确保这里开启了 Twikoo
  text: true
  lazyload: false
  count: true

twikoo:
  # 💡 重要：请务必将下方改为你真实的 Twikoo 环境地址，否则评论板块会因为报错而隐藏
  envId: https://twikoo.vlog.rr.kg 
  region: 
  visitor: true

# ==========================================
# 资源注入
# ==========================================
inject:
  head:
    - <link rel="stylesheet" href="/css/home-grid.css">
    - <link rel="stylesheet" href="/css/custom-layout.css">
    - <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
  bottom:
    - <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    - <script defer src="/js/home-carousel.js"></script>