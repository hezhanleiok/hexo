nav:
  display_title: false

avatar:
  img: /hexo/img/avatar.png
  effect: false

aside:
  display:
    archive: true
    category: true
    tag: true
  card_categories:
    enable: true
  card_archives:
    enable: true
  card_tags:
    enable: true
    limit: 20
    color: false
    orderby: name
    order: 1
  card_webinfo:
    enable: true
    post_count: true

inject:
  head:
    - <link rel="stylesheet" href="/hexo/css/custom-layout.css">
  bottom:
    - <script defer src="/hexo/js/home-carousel.js"></script>
