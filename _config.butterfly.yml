# ==========================================
# 导航栏配置
# ==========================================
nav:
  display_title: false

# ==========================================
# 文章显示配置
# ==========================================
index_post_content:
  method: 3 # 关键：自动获取文章 description 作为概述显示在标题下

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both

# 阅读数量统计 (使用不蒜子)
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true # 关键：开启文章页阅读数

# ==========================================
# 首页轮播与推荐
# ==========================================
index_slider:
  enable: true
  priority: 8
  source: posts # 抓取所有带 cover 的文章
  layout: 1

top_group:
  enable: true
  all_site: true

# ==========================================
# 侧边栏配置
# ==========================================
aside:
  display:
    archive: true
    category: true
    tag: true
  card_categories:
    enable: true
  card_archives:
    enable: true
  card_tags:
    enable: true
  # 关键修复：开启最新评论板块
  card_newest_comments:
    enable: true
    limit: 6
    avatar: true
  card_webinfo:
    enable: true
    post_count: true

# ==========================================
# 资源注入
# ==========================================
inject:
  head:
    - <link rel="stylesheet" href="/css/home-grid.css">
    - <link rel="stylesheet" href="/css/custom-layout.css">
  bottom:
    - <script defer src="/js/home-carousel.js"></script>