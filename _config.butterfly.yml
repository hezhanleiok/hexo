# ==========================================
# 核心显示配置
# ==========================================
nav:
  display_title: false

avatar:
  img: /img/avatar.png
  effect: false

index_post_content:
  method: 3 # 显示文章描述

# 封面设置：确保首页显示图片
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both

# 首页轮播图
index_slider:
  enable: true
  priority: 8
  source: posts
  layout: 1

# 特别推荐位
top_group:
  enable: true
  all_site: true

# ==========================================
# 侧边栏配置
# ==========================================
aside:
  display:
    archive: true
    category: true
    tag: true
  card_categories:
    enable: true
  card_archives:
    enable: true
  card_tags:
    enable: true
    limit: 20
    color: false
    orderby: name
    order: 1
  card_webinfo:
    enable: true
    post_count: true

# ==========================================
# 样式与脚本注入
# ==========================================
inject:
  head:
    - <link rel="stylesheet" href="/css/home-grid.css">
    - <link rel="stylesheet" href="/css/custom-layout.css">
  bottom:
    - <script defer src="/js/home-carousel.js"></script>