# ==========================================
# 导航栏设置 (修复：删除 logo 旁边的文字)
# ==========================================
nav:
  display_title: false # 必须为 false，这样就只显示你的 logo 图片

# ==========================================
# 个人资料设置
# ==========================================
author:
  name: Xiao He
  description: '热爱技术热爱生活。'
  avatar: /img/avatar.png
  link: /

# ==========================================
# 侧边栏设置 (修复：删除公告，开启最新评论)
# ==========================================
aside:
  display:
    archive: true
    category: true
    tag: true
  card_author:
    enable: true
  card_announcement:
    enable: false # 彻底关闭公告板块
  card_newest_comments:
    enable: true # 开启最新评论板块
    limit: 6
    avatar: true
  card_categories:
    enable: true
  card_tags:
    enable: true
  card_archives:
    enable: true
  card_webinfo:
    enable: true
    post_count: true

# ==========================================
# 评论系统 (确保 Twikoo 开启)
# ==========================================
comments:
  use: 
    - Twikoo
  text: true
  lazyload: false

twikoo:
  envId: https://twikoo.vlog.rr.kg # 请确保这是你真实的地址
  region: 
  visitor: true