# ==========================================
# 个人资料覆盖 (修复简介文字)
# ==========================================
author:
  description: '热爱技术热爱生活。'

# ==========================================
# 导航栏配置
# ==========================================
nav:
  display_title: false

# ==========================================
# 文章显示配置
# ==========================================
index_post_content:
  method: 3

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# ==========================================
# 侧边栏配置
# ==========================================
aside:
  display:
    archive: true
    category: true
    tag: true
  card_categories:
    enable: true
  card_archives:
    enable: true
  card_tags:
    enable: true
  card_webinfo:
    enable: true
    post_count: true

# ==========================================
# 最新评论配置 (关键修复：必须放在顶层)
# ==========================================
newest_comments:
  enable: true
  limit: 6
  avatar: true

comments:
  use: Twikoo
  text: true
  lazyload: false
  count: true

twikoo:
  # 请在此处替换为你自己的 Twikoo envId (通过云开发或 Vercel 获取)
  envId: 'https://你的twikoo环境地址' 
  region: 
  visitor: true

# ==========================================
# 资源注入
# ==========================================
inject:
  head:
    - <link rel="stylesheet" href="/css/home-grid.css">
    - <link rel="stylesheet" href="/css/custom-layout.css">
    - <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
  bottom:
    - <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    - <script defer src="/js/home-carousel.js"></script>